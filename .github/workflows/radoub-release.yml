name: Radoub Bundle Release

on:
  push:
    tags:
      - 'radoub-v*'

permissions:
  contents: write  # Required to create releases

jobs:
  build-bundle:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            bundle-name: Radoub-win-x64
            archive-ext: zip
          - os: macos-latest
            runtime: osx-arm64
            bundle-name: Radoub-osx-arm64
            archive-ext: zip
          - os: ubuntu-latest
            runtime: linux-x64
            bundle-name: Radoub-linux-x64
            archive-ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Extract Version from Tag
      id: version
      shell: bash
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#radoub-v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Restore dotnet tools
      run: dotnet tool restore

    - name: Determine Tool Versions
      id: tool-versions
      shell: bash
      run: |
        echo "parley=$(dotnet nbgv get-version -p Parley -v SemVer2)" >> $GITHUB_OUTPUT
        echo "manifest=$(dotnet nbgv get-version -p Manifest -v SemVer2)" >> $GITHUB_OUTPUT
        echo "quartermaster=$(dotnet nbgv get-version -p Quartermaster -v SemVer2)" >> $GITHUB_OUTPUT
        echo "fence=$(dotnet nbgv get-version -p Fence -v SemVer2)" >> $GITHUB_OUTPUT
        echo "relique=$(dotnet nbgv get-version -p Relique -v SemVer2)" >> $GITHUB_OUTPUT
        echo "trebuchet=$(dotnet nbgv get-version -p Trebuchet -v SemVer2)" >> $GITHUB_OUTPUT

    - name: Restore Parley dependencies
      run: dotnet restore Parley/Parley/Parley.csproj -r ${{ matrix.runtime }}

    - name: Restore Manifest dependencies
      run: dotnet restore Manifest/Manifest/Manifest.csproj -r ${{ matrix.runtime }}

    - name: Restore Fence dependencies
      run: dotnet restore Fence/Fence/Fence.csproj -r ${{ matrix.runtime }}

    - name: Restore Quartermaster dependencies
      run: dotnet restore Quartermaster/Quartermaster/Quartermaster.csproj -r ${{ matrix.runtime }}

    - name: Restore Relique dependencies
      run: dotnet restore Relique/Relique/Relique.csproj -r ${{ matrix.runtime }}

    - name: Restore Trebuchet dependencies
      run: dotnet restore Trebuchet/Trebuchet/Trebuchet.csproj -r ${{ matrix.runtime }}

    # Publish all tools to the SAME output folder - DLLs are automatically shared
    # Parley first (larger, has more dependencies including CEF)
    # IncludePlugins=false excludes plugin SDK files from bundle (plugins not ready for release)
    # NBGV injects version automatically via MSBuild
    - name: Publish Parley to shared folder
      run: dotnet publish Parley/Parley/Parley.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishReadyToRun=true -p:IncludePlugins=false -o ./publish/Radoub

    # Manifest - only adds Manifest.exe and Manifest-specific files, DLLs already present
    - name: Publish Manifest to shared folder
      run: dotnet publish Manifest/Manifest/Manifest.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishReadyToRun=true -o ./publish/Radoub

    # Fence - merchant/store editor
    - name: Publish Fence to shared folder
      run: dotnet publish Fence/Fence/Fence.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishReadyToRun=true -o ./publish/Radoub

    # Quartermaster - creature/inventory editor
    - name: Publish Quartermaster to shared folder
      run: dotnet publish Quartermaster/Quartermaster/Quartermaster.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishReadyToRun=true -o ./publish/Radoub

    # Relique - item blueprint editor (assembly name: ItemEditor)
    - name: Publish Relique to shared folder
      run: dotnet publish Relique/Relique/Relique.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishReadyToRun=true -o ./publish/Radoub

    # Trebuchet - launcher/hub (includes bundled tools/ directory with script compiler)
    - name: Publish Trebuchet to shared folder
      run: dotnet publish Trebuchet/Trebuchet/Trebuchet.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishReadyToRun=true -o ./publish/Radoub

    - name: Display bundle structure
      shell: bash
      run: |
        echo "Bundle contents:"
        ls -la ./publish/Radoub/ | head -30 || true
        echo ""
        echo "Total size:"
        du -sh ./publish/Radoub/ || dir ./publish/Radoub/

    # macOS: Create .app bundles in a Radoub folder
    - name: Create macOS App Bundles
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        mkdir -p ./bundle

        # Parley.app - copy from shared folder
        mkdir -p "./bundle/Parley.app/Contents/MacOS"
        mkdir -p "./bundle/Parley.app/Contents/Resources"
        cp ./publish/Radoub/Parley "./bundle/Parley.app/Contents/MacOS/"
        cp ./publish/Radoub/*.dylib "./bundle/Parley.app/Contents/MacOS/" 2>/dev/null || true
        cat > "./bundle/Parley.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Parley</string>
            <key>CFBundleIdentifier</key>
            <string>com.lnsdevelopment.parley</string>
            <key>CFBundleName</key>
            <string>Parley</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.tool-versions.outputs.parley }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.tool-versions.outputs.parley }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        chmod +x "./bundle/Parley.app/Contents/MacOS/Parley"

        # Manifest.app - copy from shared folder
        mkdir -p "./bundle/Manifest.app/Contents/MacOS"
        mkdir -p "./bundle/Manifest.app/Contents/Resources"
        cp ./publish/Radoub/Manifest "./bundle/Manifest.app/Contents/MacOS/"
        cp ./publish/Radoub/*.dylib "./bundle/Manifest.app/Contents/MacOS/" 2>/dev/null || true
        cat > "./bundle/Manifest.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Manifest</string>
            <key>CFBundleIdentifier</key>
            <string>com.lnsdevelopment.manifest</string>
            <key>CFBundleName</key>
            <string>Manifest</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.tool-versions.outputs.manifest }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.tool-versions.outputs.manifest }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        chmod +x "./bundle/Manifest.app/Contents/MacOS/Manifest"

        # Fence.app - copy from shared folder
        mkdir -p "./bundle/Fence.app/Contents/MacOS"
        mkdir -p "./bundle/Fence.app/Contents/Resources"
        cp ./publish/Radoub/Fence "./bundle/Fence.app/Contents/MacOS/"
        cp ./publish/Radoub/*.dylib "./bundle/Fence.app/Contents/MacOS/" 2>/dev/null || true
        cat > "./bundle/Fence.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Fence</string>
            <key>CFBundleIdentifier</key>
            <string>com.lnsdevelopment.fence</string>
            <key>CFBundleName</key>
            <string>Fence</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.tool-versions.outputs.fence }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.tool-versions.outputs.fence }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        chmod +x "./bundle/Fence.app/Contents/MacOS/Fence"

        # Quartermaster.app - copy from shared folder
        mkdir -p "./bundle/Quartermaster.app/Contents/MacOS"
        mkdir -p "./bundle/Quartermaster.app/Contents/Resources"
        cp ./publish/Radoub/Quartermaster "./bundle/Quartermaster.app/Contents/MacOS/"
        cp ./publish/Radoub/*.dylib "./bundle/Quartermaster.app/Contents/MacOS/" 2>/dev/null || true
        cat > "./bundle/Quartermaster.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Quartermaster</string>
            <key>CFBundleIdentifier</key>
            <string>com.lnsdevelopment.quartermaster</string>
            <key>CFBundleName</key>
            <string>Quartermaster</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.tool-versions.outputs.quartermaster }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.tool-versions.outputs.quartermaster }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        chmod +x "./bundle/Quartermaster.app/Contents/MacOS/Quartermaster"

        # Relique.app (ItemEditor) - copy from shared folder
        mkdir -p "./bundle/Relique.app/Contents/MacOS"
        mkdir -p "./bundle/Relique.app/Contents/Resources"
        cp ./publish/Radoub/ItemEditor "./bundle/Relique.app/Contents/MacOS/ItemEditor"
        cp ./publish/Radoub/*.dylib "./bundle/Relique.app/Contents/MacOS/" 2>/dev/null || true
        cat > "./bundle/Relique.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>ItemEditor</string>
            <key>CFBundleIdentifier</key>
            <string>com.lnsdevelopment.relique</string>
            <key>CFBundleName</key>
            <string>Relique</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.tool-versions.outputs.relique }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.tool-versions.outputs.relique }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        chmod +x "./bundle/Relique.app/Contents/MacOS/ItemEditor"

        # Trebuchet.app - copy from shared folder (includes tools/ for script compiler)
        mkdir -p "./bundle/Trebuchet.app/Contents/MacOS"
        mkdir -p "./bundle/Trebuchet.app/Contents/Resources"
        cp ./publish/Radoub/Trebuchet "./bundle/Trebuchet.app/Contents/MacOS/"
        cp ./publish/Radoub/*.dylib "./bundle/Trebuchet.app/Contents/MacOS/" 2>/dev/null || true
        cp -r ./publish/Radoub/tools "./bundle/Trebuchet.app/Contents/MacOS/tools" 2>/dev/null || true
        cat > "./bundle/Trebuchet.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Trebuchet</string>
            <key>CFBundleIdentifier</key>
            <string>com.lnsdevelopment.trebuchet</string>
            <key>CFBundleName</key>
            <string>Trebuchet</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.tool-versions.outputs.trebuchet }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.tool-versions.outputs.trebuchet }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        chmod +x "./bundle/Trebuchet.app/Contents/MacOS/Trebuchet"

    # Linux: Make executables
    - name: Set Linux permissions
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        chmod +x ./publish/Radoub/Parley
        chmod +x ./publish/Radoub/Manifest
        chmod +x ./publish/Radoub/Quartermaster
        chmod +x ./publish/Radoub/Fence
        chmod +x ./publish/Radoub/ItemEditor
        chmod +x ./publish/Radoub/Trebuchet
        chmod +x ./publish/Radoub/tools/nwn_script_comp_linux 2>/dev/null || true

    # Package bundle - Windows/Linux use the shared folder directly
    - name: Package Windows Bundle
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        cd ./publish
        Compress-Archive -Path "Radoub" -DestinationPath "../${{ matrix.bundle-name }}.zip"
        Write-Host "Created: ${{ matrix.bundle-name }}.zip"

    - name: Package macOS Bundle
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        cd ./bundle
        zip -r ../${{ matrix.bundle-name }}.zip .
        echo "Created: ${{ matrix.bundle-name }}.zip"

    - name: Package Linux Bundle
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        cd ./publish
        tar -czf ../${{ matrix.bundle-name }}.tar.gz Radoub
        echo "Created: ${{ matrix.bundle-name }}.tar.gz"

    - name: Upload bundle artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.bundle-name }}
        path: |
          ${{ matrix.bundle-name }}.zip
          ${{ matrix.bundle-name }}.tar.gz
        if-no-files-found: ignore

  create-release:
    needs: build-bundle
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Extract Version from Tag
      id: version
      shell: bash
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#radoub-v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Extract Changelog Highlights
      id: highlights
      shell: bash
      run: |
        # Check for manually curated release notes first (created by /release command)
        if [ -f "release-notes.md" ]; then
          echo "Using curated release-notes.md"
          cp release-notes.md highlights.md
        else
          # Fallback: auto-extract from tool changelogs
          extract_changelog_section() {
            local file="$1"
            local tool_name="$2"

            if [ ! -f "$file" ]; then
              echo "### $tool_name"
              echo "_No changelog found_"
              echo ""
              return
            fi

            # Find the first versioned section (skip [Unreleased])
            local section=$(awk '
              /^## \[[0-9]/ { if (found) exit; found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' "$file")

            if [ -n "$section" ]; then
              echo "### $tool_name"
              # Extract just the key points - lines starting with - or ###
              echo "$section" | grep -E "^(###|- \[?x?\]?)" | head -15 | sed 's/^### /#### /'
              echo ""
            fi
          }

          {
            echo "## Highlights"
            echo ""
            extract_changelog_section "Parley/CHANGELOG.md" "Parley"
            extract_changelog_section "Manifest/CHANGELOG.md" "Manifest"
            extract_changelog_section "Quartermaster/CHANGELOG.md" "Quartermaster"
            extract_changelog_section "Fence/CHANGELOG.md" "Fence"
            extract_changelog_section "Relique/CHANGELOG.md" "Relique"
            extract_changelog_section "Trebuchet/CHANGELOG.md" "Trebuchet"
          } > highlights.md
        fi

        # Store as multiline output
        {
          echo 'highlights<<EOF'
          cat highlights.md
          echo 'EOF'
        } >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: ./artifacts

    - name: Display artifact structure
      run: |
        echo "Artifacts downloaded:"
        find ./artifacts -type f

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/**/*.zip
          ./artifacts/**/*.tar.gz
        body: |
          # Radoub ${{ steps.version.outputs.version }}

          Bundled release containing Parley, Manifest, Quartermaster, Fence, Relique, and Trebuchet with shared runtime.

          ${{ steps.highlights.outputs.highlights }}

          ## Downloads

          ### Recommended (No .NET Required)

          These bundles include everything needed - just download and run!

          - **Windows**: `Radoub-win-x64.zip` (~110MB)
            - Extract and run `Radoub/Parley.exe`, `Radoub/Manifest.exe`, `Radoub/Quartermaster.exe`, `Radoub/Fence.exe`, `Radoub/ItemEditor.exe`, or `Radoub/Trebuchet.exe`
          - **macOS**: `Radoub-osx-arm64.zip` (~130MB)
            - Extract and open `Parley.app`, `Manifest.app`, `Quartermaster.app`, `Fence.app`, `Relique.app`, or `Trebuchet.app`
            - Apple Silicon (M1/M2/M3) Macs
          - **Linux**: `Radoub-linux-x64.tar.gz` (~115MB)
            - Extract and run `./Radoub/Parley`, `./Radoub/Manifest`, `./Radoub/Quartermaster`, `./Radoub/Fence`, `./Radoub/ItemEditor`, or `./Radoub/Trebuchet`

          ## What's Included

          | Tool | Description |
          |------|-------------|
          | **Parley** | Dialog editor for `.dlg` files |
          | **Manifest** | Journal editor for `.jrl` files |
          | **Quartermaster** | Creature/inventory editor for `.utc`/`.bic` files |
          | **Fence** | Merchant/store editor for `.utm` files |
          | **Relique** (ItemEditor) | Item blueprint editor for `.uti` files |
          | **Trebuchet** | Launcher, module editor, and build system |

          ## Shared Infrastructure

          All tools share a single folder with common dependencies:
          - .NET 9 runtime (shared, not duplicated)
          - Avalonia UI framework
          - Radoub.Formats library
          - Radoub.UI shared components
          - Cross-tool discovery (launch Manifest from Parley's Quest Browser)

          ## Changes

          See the individual changelogs:
          - [Parley CHANGELOG](https://github.com/${{ github.repository }}/blob/main/Parley/CHANGELOG.md)
          - [Manifest CHANGELOG](https://github.com/${{ github.repository }}/blob/main/Manifest/CHANGELOG.md)
          - [Quartermaster CHANGELOG](https://github.com/${{ github.repository }}/blob/main/Quartermaster/CHANGELOG.md)
          - [Fence CHANGELOG](https://github.com/${{ github.repository }}/blob/main/Fence/CHANGELOG.md)
          - [Relique CHANGELOG](https://github.com/${{ github.repository }}/blob/main/Relique/CHANGELOG.md)
          - [Trebuchet CHANGELOG](https://github.com/${{ github.repository }}/blob/main/Trebuchet/CHANGELOG.md)

          ## Installation Notes

          **macOS**: You may need to allow the apps in System Preferences → Security & Privacy after first launch.

          **Linux**: Make binaries executable: `chmod +x Radoub/Parley Radoub/Manifest Radoub/Quartermaster Radoub/Fence Radoub/ItemEditor Radoub/Trebuchet`

          ---
          🤖 Generated with [Claude Code](https://claude.com/claude-code)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
