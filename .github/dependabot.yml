# Dependabot configuration for Radoub toolset
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Central package management (Directory.Packages.props) is in use, but Dependabot
# still walks each project directory to discover PackageReference items. One
# update block per project keeps PRs scoped + labeled per tool.

version: 2
updates:
  # ---- Tools ----

  - package-ecosystem: "nuget"
    directory: "/Parley"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "parley"
    ignore:
      # Avalonia 12.x has too many breaking changes for now — stay on 11.x.
      - dependency-name: "Avalonia*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "nuget"
    directory: "/Manifest"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "manifest"
    ignore:
      - dependency-name: "Avalonia*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "nuget"
    directory: "/Quartermaster"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "quartermaster"
    ignore:
      - dependency-name: "Avalonia*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "nuget"
    directory: "/Fence"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "fence"
    ignore:
      - dependency-name: "Avalonia*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "nuget"
    directory: "/Relique"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "relique"
    ignore:
      - dependency-name: "Avalonia*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "nuget"
    directory: "/Trebuchet"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "trebuchet"
    ignore:
      - dependency-name: "Avalonia*"
        update-types: ["version-update:semver-major"]

  # ---- Shared libraries ----

  - package-ecosystem: "nuget"
    directory: "/Radoub.Formats"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "radoub"

  - package-ecosystem: "nuget"
    directory: "/Radoub.UI"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "radoub"
    ignore:
      - dependency-name: "Avalonia*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "nuget"
    directory: "/Radoub.Dictionary"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "radoub"

  - package-ecosystem: "nuget"
    directory: "/Radoub.TestUtilities"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "radoub"

  - package-ecosystem: "nuget"
    directory: "/Radoub.IntegrationTests"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "radoub"
      - "tests"

  # ---- CI ----

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
